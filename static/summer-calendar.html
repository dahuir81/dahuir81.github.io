<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ Noah 暑期课表 - 2026</title>
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card-hover: #222244;
  --border: #2a2a4a;
  --text: #e0e0f0;
  --text-dim: #8888aa;
  --accent: #6c5ce7;
  --accent-light: #a29bfe;
  --green: #00b894;
  --orange: #fdcb6e;
  --red: #e17055;
  --blue: #74b9ff;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
.container { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
.header { text-align: center; padding: 32px 0 24px; }
.header h1 {
  font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent-light), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .subtitle { color: var(--text-dim); font-size: 14px; margin-top: 4px; }
.stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 20px; text-align: center; min-width: 100px;
}
.stat-card .num { font-size: 22px; font-weight: 700; color: var(--accent-light); }
.stat-card .label { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.phase-section { margin-bottom: 24px; }
.phase-cards { display: flex; flex-direction: column; gap: 12px; }
.phase-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 18px; transition: all 0.2s;
}
.phase-card:hover { background: var(--card-hover); border-color: var(--accent); }
.phase-card .phase-title {
  font-size: 16px; font-weight: 600; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.phase-card .phase-title .tag {
  font-size: 11px; padding: 2px 8px; border-radius: 20px; color: white; font-weight: 500;
}
.tag-phase1 { background: var(--accent); }
.tag-phase2 { background: var(--blue); }
.tag-phase3 { background: var(--green); }
.phase-card .phase-dates { font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
.phase-card .phase-items { display: flex; flex-direction: column; gap: 4px; }
.phase-card .phase-item { font-size: 14px; display: flex; align-items: center; gap: 8px; }
.phase-item .time { color: var(--accent-light); font-weight: 500; min-width: 120px; }
.phase-item .name { color: var(--text); }
.calendar-wrapper {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; margin-bottom: 24px;
}
.calendar-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; background: rgba(108,92,231,0.08); border-bottom: 1px solid var(--border);
}
.calendar-header h2 { font-size: 18px; font-weight: 600; white-space: nowrap; }
.calendar-header .nav-btn {
  background: none; border: 1px solid var(--border); color: var(--text);
  padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s;
}
.calendar-header .nav-btn:hover { background: var(--accent); border-color: var(--accent); }
.cal-nav { display: flex; align-items: center; gap: 10px; }
.calendar-header .today-btn {
  background: var(--accent); border: 1px solid var(--accent); color: white;
  padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: opacity 0.2s;
}
.calendar-header .today-btn:hover { opacity: 0.85; }
.weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
  padding: 8px 0; color: var(--text-dim); font-size: 13px; font-weight: 500;
  border-bottom: 1px solid var(--border);
}
.weekdays span:first-child, .weekdays span:last-child { color: var(--red); }
.days { display: grid; grid-template-columns: repeat(7, 1fr); }
.day-cell {
  position: relative; min-height: 80px; padding: 6px;
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s;
}
.day-cell:nth-child(7n) { border-right: none; }
.day-cell:hover { background: rgba(108,92,231,0.06); }
.day-cell.other-month { opacity: 0.25; }
.day-cell.today { background: rgba(108,92,231,0.1); }
.day-cell.today .day-num {
  background: var(--accent); color: white; border-radius: 50%;
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
}
.day-cell.weekend .day-num { color: var(--red); opacity: 0.5; }
.day-num { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.day-events { display: flex; flex-direction: column; gap: 2px; }
.day-event-dot {
  font-size: 9px; padding: 1px 4px; border-radius: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white; font-weight: 500;
}
.event-section { margin-bottom: 24px; }
.event-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.event-section-header h3 { font-size: 18px; font-weight: 600; }
.add-btn {
  background: var(--accent); border: none; color: white;
  padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500;
  transition: opacity 0.2s;
}
.add-btn:hover { opacity: 0.85; }
.event-cards { display: flex; flex-direction: column; gap: 10px; }
.event-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; display: flex; align-items: center; gap: 14px; transition: all 0.2s;
  animation: fadeIn 0.3s ease;
}
.event-card:hover { background: var(--card-hover); border-color: var(--accent); }
.event-color { width: 4px; height: 48px; border-radius: 2px; flex-shrink: 0; }
.event-info { flex: 1; min-width: 0; }
.event-info .event-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.event-info .event-date { font-size: 13px; color: var(--text-dim); }
.event-info .event-time { font-size: 12px; color: var(--accent-light); }
.event-actions { display: flex; gap: 6px; flex-shrink: 0; }
.event-actions button {
  background: none; border: 1px solid var(--border); color: var(--text-dim);
  padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s;
}
.event-actions .ical-btn { border-color: var(--green); color: var(--green); }
.event-actions .ical-btn:hover { background: var(--green); color: var(--bg); }
.event-actions .edit-btn:hover { border-color: var(--blue); color: var(--blue); background: rgba(116,185,255,0.1); }
.event-actions .del-btn:hover { border-color: var(--red); color: var(--red); background: rgba(225,112,85,0.1); }
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 28px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
}
.modal h3 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; }
.form-group input, .form-group select {
  width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.04);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text);
  font-size: 14px; outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--accent); }
.form-group input[type="color"] { height: 40px; padding: 4px; cursor: pointer; }
.form-group .hint { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.checkbox-group { display: flex; align-items: center; gap: 8px; margin: 12px 0; }
.checkbox-group input[type="checkbox"] { width: auto; accent-color: var(--accent); }
.checkbox-group label { margin: 0; display: inline; }
.form-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
.form-btns .btn-primary { background: var(--accent); border: none; color: white; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
.form-btns .btn-primary:hover { opacity: 0.85; }
.form-btns .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.form-btns .btn-cancel:hover { background: rgba(255,255,255,0.04); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
.empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--card); border: 1px solid var(--border); color: var(--green);
  padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 500;
  z-index: 2000; opacity: 0; transition: all 0.3s; pointer-events: none;
  white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.export-all-wrap { text-align: center; margin-bottom: 20px; }
.export-all-btn {
  background: var(--green); border: none; color: white; padding: 10px 24px;
  border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: opacity 0.2s;
}
.export-all-btn:hover { opacity: 0.85; }
@media (max-width: 600px) {
  .container { padding: 12px 8px; }
  .header h1 { font-size: 22px; }
  .day-cell { min-height: 56px; padding: 4px; }
  .day-num { font-size: 11px; }
  .day-event-dot { font-size: 7px; padding: 0 3px; }
  .event-card { flex-wrap: wrap; }
  .event-actions { width: 100%; justify-content: flex-end; }
  .form-row { grid-template-columns: 1fr; }
  .stats { gap: 8px; }
  .stat-card { min-width: 80px; padding: 8px 14px; }
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>☀️ Noah 暑期课表</h1>
    <p class="subtitle">2026年7月-8月 · 周六周日休息</p>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">课程数</div></div>
    <div class="stat-card"><div class="num" id="statDays">0</div><div class="label">上课天数</div></div>
    <div class="stat-card"><div class="num" id="statHours">0</div><div class="label">总学时(h)</div></div>
  </div>
  <div class="phase-section"><div class="phase-cards" id="phaseCards"></div></div>
  <div class="calendar-wrapper">
    <div class="calendar-header">
      <div class="cal-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">‹ 上月</button>
        <h2 id="calTitle">2026年7月</h2>
        <button class="nav-btn" onclick="changeMonth(1)">下月 ›</button>
      </div>
      <button class="today-btn" onclick="goToday()">今天</button>
    </div>
    <div class="weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
    <div class="days" id="daysGrid"></div>
  </div>
  <div class="export-all-wrap"><button class="export-all-btn" onclick="exportAllICS()">📅 导出全部活动到日历 (.ics)</button></div>
  <div class="event-section">
    <div class="event-section-header"><h3>📋 活动列表</h3><button class="add-btn" onclick="openAddModal()">+ 添加活动</button></div>
    <div class="event-cards" id="eventList"></div>
  </div>
</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">添加活动</h3>
    <form id="eventForm" onsubmit="saveEvent(event)">
      <input type="hidden" id="editId">
      <div class="form-group"><label>活动名称 *</label><input type="text" id="formTitle" placeholder="如：优等生幼小衔接" required></div>
      <div class="form-group"><label>颜色标签</label><input type="color" id="formColor" value="#6c5ce7"></div>
      <div class="form-row">
        <div class="form-group"><label>开始日期 *</label><input type="date" id="formStart" required></div>
        <div class="form-group"><label>结束日期 *</label><input type="date" id="formEnd" required></div>
      </div>
      <div class="checkbox-group"><input type="checkbox" id="formAllDay" checked onchange="toggleTimeInputs()"><label for="formAllDay">全天活动</label></div>
      <div class="form-row" id="timeRow">
        <div class="form-group"><label>开始时间</label><input type="time" id="formStartTime" value="09:00"></div>
        <div class="form-group"><label>结束时间</label><input type="time" id="formEndTime" value="17:00"></div>
      </div>
      <div class="checkbox-group"><input type="checkbox" id="formWeekdays" checked><label for="formWeekdays">仅工作日（周一到周五）</label></div>
      <p class="hint" style="margin-bottom:12px;">勾选后自动跳过周末</p>
      <div class="form-btns"><button type="button" class="btn-cancel" onclick="closeModal()">取消</button><button type="submit" class="btn-primary">✓ 保存</button></div>
    </form>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const STORAGE_KEY='summer_calendar_events_2026';
const STORAGE_VERSION=4;
const VERSION_KEY='summer_calendar_version_2026';
const DEFAULT_EVENTS=[
  {id:'phase1_rise',title:'优等生幼小衔接',start:'2026-07-06',end:'2026-07-17',allDay:false,startTime:'08:30',endTime:'16:30',weekdaysOnly:true,color:'#6c5ce7'},
  {id:'phase1_thinking',title:'学而思思维暑期',start:'2026-07-06',end:'2026-07-17',allDay:false,startTime:'18:10',endTime:'20:10',weekdaysOnly:true,color:'#a29bfe'},
  {id:'phase2_calligraphy',title:'新东方奥体书法正音',start:'2026-07-20',end:'2026-07-31',allDay:false,startTime:'08:20',endTime:'12:30',weekdaysOnly:true,color:'#74b9ff'},
  {id:'phase3_pinyin',title:'学而思拼音',start:'2026-08-17',end:'2026-08-28',allDay:false,startTime:'10:20',endTime:'12:20',weekdaysOnly:true,color:'#00b894'},
  {id:'phase3_basketball',title:'篮球',start:'2026-08-17',end:'2026-08-28',allDay:false,startTime:'16:00',endTime:'17:30',weekdaysOnly:true,color:'#fdcb6e'}
];
function loadEvents(){const d=JSON.parse(JSON.stringify(DEFAULT_EVENTS));try{const r=localStorage.getItem(STORAGE_KEY);if(r&&!needsRefresh()){const p=JSON.parse(r);if(Array.isArray(p)&&p.length>0)return p}}catch(e){}saveEvents(d);return d}
function needsRefresh(){return localStorage.getItem(VERSION_KEY)!=STORAGE_VERSION}
function saveEvents(e){localStorage.setItem(VERSION_KEY,STORAGE_VERSION);localStorage.setItem(STORAGE_KEY,JSON.stringify(e))}
let events=loadEvents();
let currentMonth=6,currentYear=2026;
function pad(n){return n.toString().padStart(2,'0')}
function dateStr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function getDatesBetween(s,e){const r=[];let c=parseDate(s);const ed=parseDate(e);while(c<=ed){r.push(dateStr(c));c.setDate(c.getDate()+1)}return r}
function isWeekday(d){const w=parseDate(d).getDay();return w>=1&&w<=5}
function getEventDates(evt){const a=getDatesBetween(evt.start,evt.end);return evt.weekdaysOnly?a.filter(d=>isWeekday(d)):a}
function minutesSinceMidnight(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m}
function calcHours(evt){if(evt.allDay){return getEventDates(evt).length*7}const d=getEventDates(evt);const m=minutesSinceMidnight(evt.endTime||'17:00')-minutesSinceMidnight(evt.startTime||'09:00');return Math.round(d.length*(m/60)*10)/10}
function renderPhases(){const c=document.getElementById('phaseCards');c.innerHTML=[
{title:'第一阶段',dates:'7/6（一）→ 7/17（五）',tag:'两周一拖二',cls:'tag-phase1',items:[{t:'08:30 - 16:30',n:'优等生幼小衔接'},{t:'18:10 - 20:10',n:'学而思思维暑期'}]},
{title:'第二阶段',dates:'7/20（一）→ 7/31（五）',tag:'两周·半天',cls:'tag-phase2',items:[{t:'08:20 - 12:30',n:'新东方奥体书法正音'}]},
{title:'第三阶段',dates:'8/17（一）→ 8/28（五）',tag:'两周·双课',cls:'tag-phase3',items:[{t:'10:20 - 12:20',n:'学而思拼音'},{t:'16:00 - 17:30',n:'篮球'}]}
].map(p=>'<div class="phase-card"><div class="phase-title">'+p.title+'<span class="tag '+p.cls+'">'+p.tag+'</span></div><div class="phase-dates">'+p.dates+'</div><div class="phase-items">'+p.items.map(i=>'<div class="phase-item"><span class="time">'+i.t+'</span><span class="name">'+i.n+'</span></div>').join('')+'</div></div>').join('')}
function renderCalendar(){const g=document.getElementById('daysGrid');const t=document.getElementById('calTitle');t.textContent=currentYear+'年'+(currentMonth+1)+'月';const fd=new Date(currentYear,currentMonth,1).getDay();const dim=new Date(currentYear,currentMonth+1,0).getDate();const dip=new Date(currentYear,currentMonth,0).getDate();const td=dateStr(new Date());g.innerHTML='';for(let i=fd-1;i>=0;i--){const c=document.createElement('div');c.className='day-cell other-month';c.innerHTML='<div class="day-num">'+(dip-i)+'</div>';g.appendChild(c)}for(let d=1;d<=dim;d++){const ds=currentYear+'-'+pad(currentMonth+1)+'-'+pad(d);const c=document.createElement('div');c.className='day-cell';if(ds===td)c.classList.add('today');if(isWeekend(ds))c.classList.add('weekend');c.innerHTML='<div class="day-num">'+d+'</div><div class="day-events"></div>';const ec=c.querySelector('.day-events');getEventsForDate(ds).forEach(evt=>{const dot=document.createElement('div');dot.className='day-event-dot';dot.style.background=evt.color;let sn=evt.title;if(sn.length>5)sn=sn.substring(0,4)+'…';dot.textContent=sn;ec.appendChild(dot)});c.addEventListener('click',()=>{document.getElementById('formStart').value=ds;document.getElementById('formEnd').value=ds;openAddModal()});g.appendChild(c)}const tc=fd+dim;const rm=(7-tc%7)%7;for(let d=1;d<=rm;d++){const c=document.createElement('div');c.className='day-cell other-month';c.innerHTML='<div class="day-num">'+d+'</div>';g.appendChild(c)}}
function changeMonth(delta){currentMonth+=delta;if(currentMonth>11){currentMonth=0;currentYear++}if(currentMonth<0){currentMonth=11;currentYear--}renderCalendar()}
function goToday(){const t=new Date();currentYear=t.getFullYear();currentMonth=t.getMonth();renderCalendar()}
function getEventsForDate(ds){return events.filter(evt=>getEventDates(evt).includes(ds))}
function renderEventList(){const l=document.getElementById('eventList');if(events.length===0){l.innerHTML='<div class="empty-state"><div class="big-icon">🏖️</div><p>还没有活动，点击上方添加活动开始规划吧！</p></div>';updateStats();return}l.innerHTML=events.map(evt=>{const d=getEventDates(evt);const f=d[0]||evt.start;const la=d[d.length-1]||evt.end;const td=d.length;const h=calcHours(evt);const ts=evt.allDay?'全天':evt.startTime+' - '+evt.endTime;return'<div class="event-card"><div class="event-color" style="background:'+evt.color+'"></div><div class="event-info"><div class="event-title">'+esc(evt.title)+'</div><div class="event-date">'+f+' ~ '+la+' · 共'+td+'天</div><div class="event-time">'+ts+' · '+h+'小时</div></div><div class="event-actions"><button class="ical-btn" onclick="exportSingleICS(\''+evt.id+'\')">📅 .ics</button><button class="edit-btn" onclick="openEditModal(\''+evt.id+'\')">✎ 编辑</button><button class="del-btn" onclick="deleteEvent(\''+evt.id+'\')">✕ 删除</button></div></div>'}).join('');updateStats()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function updateStats(){document.getElementById('statTotal').textContent=events.length;const ad=new Set();let th=0;events.forEach(evt=>{getEventDates(evt).forEach(d=>ad.add(d));th+=calcHours(evt)});document.getElementById('statDays').textContent=ad.size;document.getElementById('statHours').textContent=Math.round(th*10)/10}
function toggleTimeInputs(){document.getElementById('timeRow').style.display=document.getElementById('formAllDay').checked?'none':'grid'}
function openAddModal(){document.getElementById('modalTitle').textContent='添加活动';document.getElementById('editId').value='';document.getElementById('eventForm').reset();document.getElementById('formColor').value='#6c5ce7';document.getElementById('formAllDay').checked=true;document.getElementById('formWeekdays').checked=true;toggleTimeInputs();document.getElementById('modal').classList.add('active')}
function openEditModal(id){const evt=events.find(e=>e.id===id);if(!evt)return;document.getElementById('modalTitle').textContent='编辑活动';document.getElementById('editId').value=id;document.getElementById('formTitle').value=evt.title;document.getElementById('formColor').value=evt.color||'#6c5ce7';document.getElementById('formStart').value=evt.start;document.getElementById('formEnd').value=evt.end;document.getElementById('formAllDay').checked=evt.allDay;document.getElementById('formStartTime').value=evt.startTime||'09:00';document.getElementById('formEndTime').value=evt.endTime||'17:00';document.getElementById('formWeekdays').checked=evt.weekdaysOnly;toggleTimeInputs();document.getElementById('modal').classList.add('active')}
function closeModal(){document.getElementById('modal').classList.remove('active')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
function saveEvent(e){e.preventDefault();const id=document.getElementById('editId').value;const title=document.getElementById('formTitle').value.trim();const color=document.getElementById('formColor').value;const start=document.getElementById('formStart').value;const end=document.getElementById('formEnd').value;const allDay=document.getElementById('formAllDay').checked;const st=document.getElementById('formStartTime').value;const et=document.getElementById('formEndTime').value;const wk=document.getElementById('formWeekdays').checked;if(!title||!start||!end){showToast('请填写完整信息','#e17055');return}if(start>end){showToast('结束日期不能早于开始日期','#e17055');return}if(!allDay&&st>=et){showToast('结束时间必须晚于开始时间','#e17055');return}if(id){const idx=events.findIndex(e=>e.id===id);if(idx!==-1)events[idx]={...events[idx],title,color,start,end,allDay,startTime:st,endTime:et,weekdaysOnly:wk}}else{events.push({id:'evt_'+Date.now(),title,color,start,end,allDay,startTime:st,endTime:et,weekdaysOnly:wk})}saveEvents(events);closeModal();renderCalendar();renderEventList();showToast(id?'✅ 活动已更新':'✅ 活动已添加','#00b894')}
function deleteEvent(id){if(!confirm('确定要删除吗？'))return;events=events.filter(e=>e.id!==id);saveEvents(events);renderCalendar();renderEventList();showToast('🗑️ 已删除','#e17055')}
function buildICS(evt){const now=new Date();const ns=now.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';const l=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Tars//CN','CALSCALE:GREGORIAN','METHOD:PUBLISH','X-WR-CALNAME:Noah暑期课表'];const ds=evt.start.replace(/-/g,'');const uid=evt.id+'@summer';if(evt.allDay){l.push('BEGIN:VEVENT');l.push('UID:'+uid);l.push('DTSTART;VALUE=DATE:'+ds);l.push('DTEND;VALUE=DATE:'+evt.end.replace(/-/g,''));l.push('SUMMARY:'+evt.title);l.push('DTSTAMP:'+ns);if(evt.weekdaysOnly)l.push('RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;UNTIL='+evt.end.replace(/-/g,'')+'T235959Z');l.push('END:VEVENT')}else{l.push('BEGIN:VEVENT');l.push('UID:'+uid);l.push('DTSTART;TZID=Asia/Shanghai:'+evt.start.replace(/-/g,'')+'T'+(evt.startTime||'0900').replace(':','')+'00');l.push('DTEND;TZID=Asia/Shanghai:'+evt.end.replace(/-/g,'')+'T'+(evt.endTime||'1700').replace(':','')+'00');l.push('SUMMARY:'+evt.title);l.push('DTSTAMP:'+ns);if(evt.weekdaysOnly)l.push('RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;UNTIL='+evt.end.replace(/-/g,'')+'T235959Z');l.push('END:VEVENT')}l.push('END:VCALENDAR');return l.join('\r\n')}
function downloadICS(c,f){const b=new Blob([c],{type:'text/calendar;charset=utf-8'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=f;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}
function exportSingleICS(id){const evt=events.find(e=>e.id===id);if(!evt)return;downloadICS(buildICS(evt),evt.title.replace(/\s+/g,'_')+'_'+evt.start+'.ics');showToast('📅 已导出到日历','#00b894')}
function exportAllICS(){if(events.length===0){showToast('暂无活动','#e17055');return}const now=new Date();const ns=now.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';let l=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Tars//CN','CALSCALE:GREGORIAN','METHOD:PUBLISH','X-WR-CALNAME:Noah暑期课表'];events.forEach(evt=>{const ds=evt.start.replace(/-/g,'');const uid=evt.id+'@summer';if(evt.allDay){l.push('BEGIN:VEVENT');l.push('UID:'+uid);l.push('DTSTART;VALUE=DATE:'+ds);l.push('DTEND;VALUE=DATE:'+evt.end.replace(/-/g,''));l.push('SUMMARY:'+evt.title);l.push('DTSTAMP:'+ns);if(evt.weekdaysOnly)l.push('RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;UNTIL='+evt.end.replace(/-/g,'')+'T235959Z');l.push('END:VEVENT')}else{l.push('BEGIN:VEVENT');l.push('UID:'+uid);l.push('DTSTART;TZID=Asia/Shanghai:'+evt.start.replace(/-/g,'')+'T'+(evt.startTime||'0900').replace(':','')+'00');l.push('DTEND;TZID=Asia/Shanghai:'+evt.end.replace(/-/g,'')+'T'+(evt.endTime||'1700').replace(':','')+'00');l.push('SUMMARY:'+evt.title);l.push('DTSTAMP:'+ns);if(evt.weekdaysOnly)l.push('RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;UNTIL='+evt.end.replace(/-/g,'')+'T235959Z');l.push('END:VEVENT')}});l.push('END:VCALENDAR');downloadICS(l.join('\r\n'),'noah_summer_2026.ics');showToast('📅 全部已导出','#00b894')}
let toastTimer;
function showToast(msg,color='#00b894'){const t=document.getElementById('toast');t.textContent=msg;t.style.color=color;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800)}
renderPhases();renderCalendar();renderEventList();
window.addEventListener('beforeunload',()=>saveEvents(events));
</script>
</body>
</html>
