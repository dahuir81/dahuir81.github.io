<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☀️ 暑期日历管理 - 2026年7月</title>
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --card-hover: #222244;
  --border: #2a2a4a;
  --text: #e0e0f0;
  --text-dim: #8888aa;
  --accent: #6c5ce7;
  --accent-light: #a29bfe;
  --green: #00b894;
  --orange: #fdcb6e;
  --red: #e17055;
  --blue: #74b9ff;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 24px 16px;
}

/* Header */
.header {
  text-align: center;
  padding: 32px 0 24px;
}
.header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-light), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .subtitle {
  color: var(--text-dim);
  font-size: 14px;
  margin-top: 4px;
}

/* Stats Bar */
.stats {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 20px;
  text-align: center;
  min-width: 100px;
}
.stat-card .num {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent-light);
}
.stat-card .label {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* Calendar */
.calendar-wrapper {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
}
.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  background: rgba(108, 92, 231, 0.08);
  border-bottom: 1px solid var(--border);
}
.calendar-header h2 {
  font-size: 18px;
  font-weight: 600;
  white-space: nowrap;
}
.calendar-header .nav-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
}
.calendar-header .nav-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
}
.cal-nav {
  display: flex;
  align-items: center;
  gap: 10px;
}
.calendar-header .today-btn {
  background: var(--accent);
  border: 1px solid var(--accent);
  color: white;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: opacity 0.2s;
}
.calendar-header .today-btn:hover { opacity: 0.85; }

.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  padding: 8px 0;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 500;
  border-bottom: 1px solid var(--border);
}
.weekdays span:first-child, .weekdays span:last-child {
  color: var(--red);
}
.days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.day-cell {
  position: relative;
  min-height: 80px;
  padding: 6px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.day-cell:nth-child(7n) { border-right: none; }
.day-cell:hover { background: rgba(108, 92, 231, 0.06); }
.day-cell.other-month { opacity: 0.25; }
.day-cell.today { background: rgba(108, 92, 231, 0.1); }
.day-cell.today .day-num { 
  background: var(--accent);
  color: white;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.day-num {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 2px;
}
.day-events {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.day-event-dot {
  font-size: 9px;
  padding: 1px 4px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: white;
  font-weight: 500;
}
.dot-english { background: var(--accent); }
.dot-basketball { background: var(--orange); color: #1a1a2e; }
.dot-general { background: var(--blue); }

/* Event List */
.event-section {
  margin-bottom: 24px;
}
.event-section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.event-section-header h3 { font-size: 18px; font-weight: 600; }
.add-btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 8px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: opacity 0.2s;
}
.add-btn:hover { opacity: 0.85; }

.event-cards { display: flex; flex-direction: column; gap: 10px; }

.event-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all 0.2s;
}
.event-card:hover {
  background: var(--card-hover);
  border-color: var(--accent);
}
.event-color {
  width: 4px;
  height: 48px;
  border-radius: 2px;
  flex-shrink: 0;
}
.color-english { background: var(--accent); }
.color-basketball { background: var(--orange); }
.color-general { background: var(--blue); }

.event-info { flex: 1; min-width: 0; }
.event-info .event-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 2px;
}
.event-info .event-date {
  font-size: 13px;
  color: var(--text-dim);
}
.event-info .event-time {
  font-size: 12px;
  color: var(--accent-light);
}

.event-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.event-actions button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}
.event-actions .ical-btn {
  border-color: var(--green);
  color: var(--green);
}
.event-actions .ical-btn:hover {
  background: var(--green);
  color: var(--bg);
}
.event-actions .edit-btn:hover {
  border-color: var(--blue);
  color: var(--blue);
  background: rgba(116, 185, 255, 0.1);
}
.event-actions .del-btn:hover {
  border-color: var(--red);
  color: var(--red);
  background: rgba(225, 112, 85, 0.1);
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 20px;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 4px;
  font-weight: 500;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 10px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--accent);
}
.form-group input[type="color"] {
  height: 40px;
  padding: 4px;
  cursor: pointer;
}
.form-group .hint {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.checkbox-group {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 12px 0;
}
.checkbox-group input[type="checkbox"] {
  width: auto;
  accent-color: var(--accent);
}
.checkbox-group label {
  margin: 0;
  display: inline;
}

.form-btns {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  justify-content: flex-end;
}
.form-btns .btn-primary {
  background: var(--accent);
  border: none;
  color: white;
  padding: 10px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
}
.form-btns .btn-primary:hover { opacity: 0.85; }
.form-btns .btn-cancel {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 10px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}
.form-btns .btn-cancel:hover { background: rgba(255,255,255,0.04); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
}
.empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--green);
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  z-index: 2000;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Export All */
.export-all-wrap {
  text-align: center;
  margin-bottom: 20px;
}
.export-all-btn {
  background: var(--green);
  border: none;
  color: white;
  padding: 10px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: opacity 0.2s;
}
.export-all-btn:hover { opacity: 0.85; }

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 12px 8px; }
  .header h1 { font-size: 22px; }
  .day-cell { min-height: 56px; padding: 4px; }
  .day-num { font-size: 11px; }
  .day-event-dot { font-size: 7px; padding: 0 3px; }
  .event-card { flex-wrap: wrap; }
  .event-actions { width: 100%; justify-content: flex-end; }
  .form-row { grid-template-columns: 1fr; }
  .stats { gap: 8px; }
  .stat-card { min-width: 80px; padding: 8px 14px; }
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.event-card {
  animation: fadeIn 0.3s ease;
}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>☀️ 暑期日历管理</h1>
    <p class="subtitle">2026年7月 · 左右滑动切换月份</p>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="statTotal">0</div>
      <div class="label">活动总数</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statDays">0</div>
      <div class="label">覆盖天数</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statHours">0</div>
      <div class="label">总学时(h)</div>
    </div>
  </div>

  <!-- Calendar -->
  <div class="calendar-wrapper">
    <div class="calendar-header">
      <div class="cal-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">‹ 上月</button>
        <h2 id="calTitle">2026年7月</h2>
        <button class="nav-btn" onclick="changeMonth(1)">下月 ›</button>
      </div>
      <button class="today-btn" onclick="goToday()">今天</button>
    </div>
    <div class="weekdays">
      <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
    </div>
    <div class="days" id="daysGrid"></div>
  </div>

  <!-- Export All -->
  <div class="export-all-wrap">
    <button class="export-all-btn" onclick="exportAllICS()">📅 导出全部活动到日历 (.ics)</button>
  </div>

  <!-- Event List -->
  <div class="event-section">
    <div class="event-section-header">
      <h3>📋 活动列表</h3>
      <button class="add-btn" onclick="openAddModal()">+ 添加活动</button>
    </div>
    <div class="event-cards" id="eventList"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">添加活动</h3>
    <form id="eventForm" onsubmit="saveEvent(event)">
      <input type="hidden" id="editId" value="">

      <div class="form-group">
        <label>活动名称 *</label>
        <input type="text" id="formTitle" placeholder="如：英语全天班" required>
      </div>

      <div class="form-group">
        <label>颜色标签</label>
        <input type="color" id="formColor" value="#6c5ce7">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>开始日期 *</label>
          <input type="date" id="formStart" required>
        </div>
        <div class="form-group">
          <label>结束日期 *</label>
          <input type="date" id="formEnd" required>
        </div>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="formAllDay" checked onchange="toggleTimeInputs()">
        <label for="formAllDay">全天活动</label>
      </div>

      <div class="form-row" id="timeRow">
        <div class="form-group">
          <label>开始时间</label>
          <input type="time" id="formStartTime" value="09:00">
        </div>
        <div class="form-group">
          <label>结束时间</label>
          <input type="time" id="formEndTime" value="17:00">
        </div>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="formWeekdays" checked>
        <label for="formWeekdays">仅工作日（周一到周五）</label>
      </div>
      <p class="hint" style="margin-bottom: 12px;">勾选后自动跳过周末</p>

      <div class="form-btns">
        <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
        <button type="submit" class="btn-primary">✓ 保存</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── Data Store ───────────────────────────────────────
const STORAGE_KEY = 'summer_calendar_events';
const DEFAULT_EVENTS = [
  {
    id: 'eng1',
    title: '英语全天班',
    start: '2026-07-27',
    end: '2026-07-31',
    allDay: true,
    startTime: '09:00',
    endTime: '17:00',
    weekdaysOnly: true,
    color: '#6c5ce7'
  },
  {
    id: 'basket1',
    title: '篮球训练',
    start: '2026-07-06',
    end: '2026-07-17',
    allDay: false,
    startTime: '16:00',
    endTime: '17:30',
    weekdaysOnly: true,
    color: '#fdcb6e'
  },
  {
    id: 'pinyin1',
    title: '学而思奥体暑假拼音班',
    start: '2026-08-17',
    end: '2026-08-28',
    allDay: false,
    startTime: '10:20',
    endTime: '12:20',
    weekdaysOnly: true,
    color: '#74b9ff'
  }
];

function loadEvents() {
  const defaults = JSON.parse(JSON.stringify(DEFAULT_EVENTS));
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw && !needsRefresh()) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  // Version mismatch or empty — merge user events with latest defaults
  let userEvents = [];
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      userEvents = JSON.parse(raw).filter(e =>
        !defaults.some(d => d.id === e.id)
      );
    }
  } catch(e) {}
  const merged = [...defaults, ...userEvents];
  saveEvents(merged);
  return merged;
}

const STORAGE_VERSION = 2;
const VERSION_KEY = 'summer_calendar_version';

function needsRefresh() {
  return localStorage.getItem(VERSION_KEY) != STORAGE_VERSION;
}

function saveEvents(events) {
  localStorage.setItem(VERSION_KEY, STORAGE_VERSION);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
}
  localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
}

let events = loadEvents();
let currentMonth = 6; // 0-indexed, July = 6
let currentYear = 2026;

// ─── Helpers ──────────────────────────────────────────
function pad(n) { return n.toString().padStart(2, '0'); }

function dateStr(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function getDatesBetween(start, end) {
  const dates = [];
  let cur = parseDate(start);
  const endD = parseDate(end);
  while (cur <= endD) {
    dates.push(dateStr(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}

function isWeekday(d) {
  const day = parseDate(d).getDay();
  return day >= 1 && day <= 5;
}

function getEventDates(evt) {
  const allDates = getDatesBetween(evt.start, evt.end);
  if (evt.weekdaysOnly) {
    return allDates.filter(d => isWeekday(d));
  }
  return allDates;
}

function minutesSinceMidnight(t) {
  if (!t) return 0;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function calcHours(evt) {
  if (evt.allDay) {
    // Count days
    const dates = getEventDates(evt);
    return dates.length * 7; // estimate 7 hours for full-day
  }
  const dates = getEventDates(evt);
  const mins = minutesSinceMidnight(evt.endTime || '17:00') - minutesSinceMidnight(evt.startTime || '09:00');
  return Math.round(dates.length * (mins / 60) * 10) / 10;
}

// ─── Calendar Render ──────────────────────────────────
function renderCalendar() {
  const grid = document.getElementById('daysGrid');
  const title = document.getElementById('calTitle');
  title.textContent = `${currentYear}年${currentMonth + 1}月`;

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

  const today = dateStr(new Date());
  grid.innerHTML = '';

  // Previous month trailing days
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrev - i;
    const cell = document.createElement('div');
    cell.className = 'day-cell other-month';
    cell.innerHTML = `<div class="day-num">${d}</div>`;
    grid.appendChild(cell);
  }

  // This month days
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${currentYear}-${pad(currentMonth+1)}-${pad(d)}`;
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (ds === today) cell.classList.add('today');

    const dayEvents = getEventsForDate(ds);
    cell.innerHTML = `<div class="day-num">${d}</div><div class="day-events"></div>`;
    const evtContainer = cell.querySelector('.day-events');

    dayEvents.forEach(evt => {
      const dot = document.createElement('div');
      dot.className = 'day-event-dot';
      const cls = evt.id.startsWith('eng') ? 'dot-english' : evt.id.startsWith('basket') ? 'dot-basketball' : 'dot-general';
      dot.classList.add(cls);
      dot.style.background = evt.color;
      dot.textContent = evt.title;
      evtContainer.appendChild(dot);
    });

    cell.addEventListener('click', () => {
      document.getElementById('formStart').value = ds;
      document.getElementById('formEnd').value = ds;
      openAddModal();
    });

    grid.appendChild(cell);
  }

  // Fill remaining cells
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let d = 1; d <= remaining; d++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell other-month';
    cell.innerHTML = `<div class="day-num">${d}</div>`;
    grid.appendChild(cell);
  }
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function goToday() {
  const t = new Date();
  currentYear = t.getFullYear();
  currentMonth = t.getMonth();
  renderCalendar();
}

function getEventsForDate(ds) {
  return events.filter(evt => {
    const dates = getEventDates(evt);
    return dates.includes(ds);
  });
}

// ─── Event List Render ────────────────────────────────
function renderEventList() {
  const list = document.getElementById('eventList');
  if (events.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">🏖️</div>
        <p>还没有活动，点击上方「添加活动」开始规划暑期吧！</p>
      </div>`;
    updateStats();
    return;
  }

  list.innerHTML = events.map(evt => {
    const dates = getEventDates(evt);
    const firstDate = dates[0] || evt.start;
    const lastDate = dates[dates.length - 1] || evt.end;
    const totalDays = dates.length;
    const hours = calcHours(evt);
    const timeStr = evt.allDay ? '全天' : `${evt.startTime} - ${evt.endTime}`;

    const cls = evt.id.startsWith('eng') ? 'color-english' : evt.id.startsWith('basket') ? 'color-basketball' : 'color-general';

    return `
      <div class="event-card">
        <div class="event-color ${cls}" style="background:${evt.color}"></div>
        <div class="event-info">
          <div class="event-title">${escapeHtml(evt.title)}</div>
          <div class="event-date">${firstDate} ~ ${lastDate} · 共${totalDays}天</div>
          <div class="event-time">${timeStr} · ${hours}小时</div>
        </div>
        <div class="event-actions">
          <button class="ical-btn" onclick="exportSingleICS('${evt.id}')">📅 .ics</button>
          <button class="edit-btn" onclick="openEditModal('${evt.id}')">✎ 编辑</button>
          <button class="del-btn" onclick="deleteEvent('${evt.id}')">✕ 删除</button>
        </div>
      </div>`;
  }).join('');
  updateStats();
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ─── Stats ───────────────────────────────────────────-
function updateStats() {
  document.getElementById('statTotal').textContent = events.length;

  const allDates = new Set();
  let totalHours = 0;
  events.forEach(evt => {
    getEventDates(evt).forEach(d => allDates.add(d));
    totalHours += calcHours(evt);
  });
  document.getElementById('statDays').textContent = allDates.size;
  document.getElementById('statHours').textContent = Math.round(totalHours * 10) / 10;
}

// ─── Modal ────────────────────────────────────────────
function toggleTimeInputs() {
  const isAllDay = document.getElementById('formAllDay').checked;
  document.getElementById('timeRow').style.display = isAllDay ? 'none' : 'grid';
}

function openAddModal() {
  document.getElementById('modalTitle').textContent = '添加活动';
  document.getElementById('editId').value = '';
  document.getElementById('eventForm').reset();
  document.getElementById('formColor').value = '#6c5ce7';
  document.getElementById('formAllDay').checked = true;
  document.getElementById('formWeekdays').checked = true;
  toggleTimeInputs();
  document.getElementById('modal').classList.add('active');
}

function openEditModal(id) {
  const evt = events.find(e => e.id === id);
  if (!evt) return;

  document.getElementById('modalTitle').textContent = '编辑活动';
  document.getElementById('editId').value = id;
  document.getElementById('formTitle').value = evt.title;
  document.getElementById('formColor').value = evt.color || '#6c5ce7';
  document.getElementById('formStart').value = evt.start;
  document.getElementById('formEnd').value = evt.end;
  document.getElementById('formAllDay').checked = evt.allDay;
  document.getElementById('formStartTime').value = evt.startTime || '09:00';
  document.getElementById('formEndTime').value = evt.endTime || '17:00';
  document.getElementById('formWeekdays').checked = evt.weekdaysOnly;
  toggleTimeInputs();
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function saveEvent(e) {
  e.preventDefault();
  const id = document.getElementById('editId').value;
  const title = document.getElementById('formTitle').value.trim();
  const color = document.getElementById('formColor').value;
  const start = document.getElementById('formStart').value;
  const end = document.getElementById('formEnd').value;
  const allDay = document.getElementById('formAllDay').checked;
  const startTime = document.getElementById('formStartTime').value;
  const endTime = document.getElementById('formEndTime').value;
  const weekdaysOnly = document.getElementById('formWeekdays').checked;

  if (!title || !start || !end) {
    showToast('请填写完整信息', '#e17055');
    return;
  }

  if (start > end) {
    showToast('结束日期不能早于开始日期', '#e17055');
    return;
  }

  if (!allDay && startTime >= endTime) {
    showToast('结束时间必须晚于开始时间', '#e17055');
    return;
  }

  if (id) {
    // Edit
    const idx = events.findIndex(e => e.id === id);
    if (idx !== -1) {
      events[idx] = { ...events[idx], title, color, start, end, allDay, startTime, endTime, weekdaysOnly };
    }
  } else {
    // Add
    const newId = 'evt_' + Date.now();
    events.push({ id: newId, title, color, start, end, allDay, startTime, endTime, weekdaysOnly });
  }

  saveEvents(events);
  closeModal();
  renderCalendar();
  renderEventList();
  showToast(id ? '✅ 活动已更新' : '✅ 活动已添加', '#00b894');
}

function deleteEvent(id) {
  if (!confirm('确定要删除这个活动吗？')) return;
  events = events.filter(e => e.id !== id);
  saveEvents(events);
  renderCalendar();
  renderEventList();
  showToast('🗑️ 活动已删除', '#e17055');
}

// ─── ICS Export ───────────────────────────────────────
function buildICS(evt) {
  const dates = getEventDates(evt);
  const now = new Date();
  const nowStr = now.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
  const organizer = 'CN=dahuir81@github.io';

  let lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Tars Summer Calendar//CN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'X-WR-CALNAME:暑期活动'
  ];

  const dtStartStr = evt.start.replace(/-/g, '');
  const dtEndStr = evt.end.replace(/-/g, '');

  if (dates.length === 0) {
    // Single day event
    const uid = `${evt.id}@summer-calendar`;
    const dtStart = evt.allDay ? `VALUE=DATE:${dtStartStr}` : `TZID=Asia/Shanghai:${dtStartStr}T${evt.startTime || '0900'}00`;
    const dtEnd = evt.allDay ? `VALUE=DATE:${dtEndStr}` : `TZID=Asia/Shanghai:${dtEndStr}T${evt.endTime || '1700'}00`;

    lines.push('BEGIN:VEVENT');
    lines.push(`UID:${uid}`);
    lines.push(`DTSTART;${dtStart}`);
    lines.push(`DTEND;${dtEnd}`);
    lines.push(`SUMMARY:${evt.title}`);
    lines.push(`DESCRIPTION:暑期活动 - ${evt.title}`);
    lines.push(`DTSTAMP:${nowStr}`);
    if (!evt.allDay && evt.weekdaysOnly) {
      lines.push('RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR');
    }
    lines.push('END:VEVENT');
  } else {
    // Create VEVENT for each date (or use RRULE for efficiency)
    const uid = `${evt.id}@summer-calendar`;
    const dtStart = evt.allDay ? `VALUE=DATE:${dtStartStr}` : `TZID=Asia/Shanghai:${dtStartStr}T${evt.startTime || '0900'}00`;
    const dtEndVal = evt.allDay ? `VALUE=DATE:${dtEndStr}` : `TZID=Asia/Shanghai:${dtEndStr}T${evt.endTime || '1700'}00`;

    lines.push('BEGIN:VEVENT');
    lines.push(`UID:${uid}`);
    lines.push(`DTSTART;${dtStart}`);
    lines.push(`DTEND;${dtEndVal}`);
    lines.push(`SUMMARY:${evt.title}`);
    lines.push(`DESCRIPTION:暑期活动 - ${evt.title}`);
    lines.push(`DTSTAMP:${nowStr}`);

    if (evt.weekdaysOnly && dates.length > 1) {
      // Recurring weekdays
      const untilStr = evt.end.replace(/-/g, '') + 'T235959Z';
      lines.push('RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;UNTIL=' + untilStr);
    } else if (dates.length > 1) {
      // Recurring daily
      const untilStr = evt.end.replace(/-/g, '') + 'T235959Z';
      lines.push('RRULE:FREQ=DAILY;UNTIL=' + untilStr);
    }

    lines.push('END:VEVENT');
  }

  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function downloadICS(content, filename) {
  const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportSingleICS(id) {
  const evt = events.find(e => e.id === id);
  if (!evt) return;
  const ics = buildICS(evt);
  const name = `${evt.title.replace(/\s+/g, '_')}_${evt.start}.ics`;
  downloadICS(ics, name);
  showToast(`📅 "${evt.title}" 已导出到日历`, '#00b894');
}

function exportAllICS() {
  if (events.length === 0) {
    showToast('暂无活动可导出', '#e17055');
    return;
  }

  const now = new Date();
  const nowStr = now.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';

  let lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Tars Summer Calendar//CN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'X-WR-CALNAME:暑期活动'
  ];

  events.forEach(evt => {
    const dates = getEventDates(evt);
    const dtStartStr = evt.start.replace(/-/g, '');
    const dtEndStr = evt.end.replace(/-/g, '');
    const uid = `${evt.id}@summer-calendar`;

    if (dates.length === 0) {
      const ds = evt.allDay ? `VALUE=DATE:${dtStartStr}` : `TZID=Asia/Shanghai:${dtStartStr}T${(evt.startTime||'0900').replace(':','')}00`;
      const de = evt.allDay ? `VALUE=DATE:${dtEndStr}` : `TZID=Asia/Shanghai:${dtEndStr}T${(evt.endTime||'1700').replace(':','')}00`;
      lines.push('BEGIN:VEVENT');
      lines.push(`UID:${uid}`);
      lines.push(`DTSTART;${ds}`);
      lines.push(`DTEND;${de}`);
      lines.push(`SUMMARY:${evt.title}`);
      lines.push(`DESCRIPTION:暑期活动`);
      lines.push(`DTSTAMP:${nowStr}`);
      lines.push('END:VEVENT');
    } else {
      const ds = evt.allDay ? `VALUE=DATE:${dtStartStr}` : `TZID=Asia/Shanghai:${dtStartStr}T${(evt.startTime||'0900').replace(':','')}00`;
      const de = evt.allDay ? `VALUE=DATE:${dtEndStr}` : `TZID=Asia/Shanghai:${dtEndStr}T${(evt.endTime||'1700').replace(':','')}00`;
      lines.push('BEGIN:VEVENT');
      lines.push(`UID:${uid}`);
      lines.push(`DTSTART;${ds}`);
      lines.push(`DTEND;${de}`);
      lines.push(`SUMMARY:${evt.title}`);
      lines.push(`DESCRIPTION:暑期活动`);
      lines.push(`DTSTAMP:${nowStr}`);
      if (evt.weekdaysOnly) {
        const until = evt.end.replace(/-/g, '') + 'T235959Z';
        lines.push('RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR;UNTIL=' + until);
      } else if (dates.length > 1) {
        const until = evt.end.replace(/-/g, '') + 'T235959Z';
        lines.push('RRULE:FREQ=DAILY;UNTIL=' + until);
      }
      lines.push('END:VEVENT');
    }
  });

  lines.push('END:VCALENDAR');
  downloadICS(lines.join('\r\n'), 'summer_calendar_202607.ics');
  showToast('📅 全部活动已导出，打开 .ics 文件即可导入手机日历', '#00b894');
}

// ─── Toast ────────────────────────────────────────────
let toastTimer;

function showToast(msg, color = '#00b894') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = color;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── Init ─────────────────────────────────────────────
renderCalendar();
renderEventList();

// Save on page close
window.addEventListener('beforeunload', () => {
  saveEvents(events);
});
</script>
