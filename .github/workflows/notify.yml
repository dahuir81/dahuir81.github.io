name: Notify After Deploy

on:
  workflow_run:
    workflows: ["Deploy Hugo site to Pages"]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for deployment
        run: sleep 30

      - name: Get latest post info
        id: post
        run: |
          LATEST_POST=$(ls -t content/posts/*.md | head -1)
          TITLE=$(grep "^title:" "$LATEST_POST" | sed 's/title: "//;s/"$//')
          SLUG=$(basename "$LATEST_POST" .md)
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "date=$(grep "^date:" "$LATEST_POST" | sed 's/date: //' | head -1)" >> $GITHUB_OUTPUT

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: 5283728@qq.com
          password: ${{ secrets.QQ_SMTP_PASSWORD }}
          subject: "[博客发布] ${{ steps.post.outputs.title }}"
          body: |
            📝 博客文章已发布

            标题：${{ steps.post.outputs.title }}
            链接：https://dahuir81.github.io/posts/${{ steps.post.outputs.slug }}/
            时间：${{ steps.post.outputs.date }}
          to: 5283728@qq.com
          from: 5283728@qq.com

      - name: Send Feishu notification
        run: |
          curl -X POST "${{ secrets.OPENCLAW_GATEWAY }}/notify" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "blog_published",
              "title": "${{ steps.post.outputs.title }}",
              "url": "https://dahuir81.github.io/posts/${{ steps.post.outputs.slug }}/",
              "channel": "feishu"
            }' || true
